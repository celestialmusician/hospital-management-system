{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Doctor Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#020617,#0f172a,#1d4ed8);

overflow:hidden;

}

body::before{

content:"";

position:absolute;

width:450px;

height:450px;

background:rgba(255,255,255,.08);

border-radius:50%;

left:-150px;

top:-150px;

}

body::after{

content:"";

position:absolute;

width:350px;

height:350px;

background:rgba(255,255,255,.05);

border-radius:50%;

right:-100px;

bottom:-100px;

}

.login-card{

position:relative;

z-index:5;

width:100%;

max-width:520px;

padding:45px;

border-radius:28px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.2);

box-shadow:0 30px 80px rgba(0,0,0,.35);

}

.logo{

width:90px;

height:90px;

margin:auto;

border-radius:50%;

background:white;

display:flex;

align-items:center;

justify-content:center;

font-size:40px;

color:#2563eb;

margin-bottom:20px;

}

h2{

text-align:center;

color:white;

font-weight:700;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#dbeafe;

margin-bottom:25px;

}

label{

color:white;

font-weight:600;

margin-bottom:8px;

display:block;

}

.form-control{

height:56px;

border-radius:15px;

border:none;

padding-left:18px;

margin-bottom:18px;

}

.form-control:focus{

box-shadow:0 0 0 4px rgba(255,255,255,.25);

}

.btn-login{

width:100%;

height:56px;

border:none;

border-radius:15px;

background:white;
color:#2563eb;

font-size:18px;

font-weight:700;

transition:.3s;

}

.btn-login:hover{

background:#facc15;

color:#111827;

transform:translateY(-3px);

box-shadow:0 15px 35px rgba(250,204,21,.35);

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">

<i class="bi bi-person-badge-fill"></i>

</div>

<h2>

Doctor / Admin Login

</h2>

<p class="subtitle">

Secure access for Doctors & Administrators

</p>

<form method="POST">

{% csrf_token %}

<label>

Email Address

</label>

{{ form.email }}

<label>

Password

</label>

{{ form.password }}

<button
type="submit"
class="btn btn-login">

<i class="bi bi-box-arrow-in-right"></i>

Login

</button>

</form>

{% if error %}

<div class="alert alert-danger mt-4 rounded-4 text-center">

<i class="bi bi-exclamation-triangle-fill"></i>

{{ error }}

</div>

{% endif %}

<a
href="{% url 'home' %}"
class="btn btn-outline-light w-100 home-btn">

<i class="bi bi-arrow-left-circle"></i>

Back to Home

</a>

<div class="footer-text">

<i class="bi bi-shield-lock-fill"></i>

Secure Doctor Authentication

<br><br>

© 2026 MediCare+ Hospital Management System

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
